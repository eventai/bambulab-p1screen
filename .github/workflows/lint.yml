name: Lint

on:
  push:
    branches:
      - "main"
      - "develop/*"
  workflow_dispatch:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
